services:
  - type: web
    name: bloxupgrader
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://bloxupgrader.com
      - key: USER_DB_DIR
        value: /var/data/user-db
    disk:
      name: blox-data
      mountPath: /var/data
      sizeGB: 1
