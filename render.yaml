services:
  - type: web
    name: bloxupgrader
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://bloxupgrader.com
      - key: DATA_DIR
        value: /var/data
      - key: USER_DB_DIR
        value: /var/data/user-db
      - key: USER_LOGS_DIR
        value: /var/data/user-logs
      - key: CHATS_DIR
        value: /var/data/withdraw-chats
      - key: GRANTS_DIR
        value: /var/data/inventory-grants
      - key: BALANCE_GRANTS_DIR
        value: /var/data/balance-grants
      - key: STATE_DIR
        value: /var/data/site-state
    disk:
      name: blox-data
      mountPath: /var/data
      sizeGB: 1
